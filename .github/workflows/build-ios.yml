name: Build iOS App (Fixed)

on:
  workflow_dispatch:  # Alleen handmatig triggeren

jobs:
  build-ios:
    name: Build iOS App (macOS Runner)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install torch coremltools

      - name: Check Model Location
        run: |
          echo "Checking for model files..."
          ls -la *.mlmodel 2>/dev/null || echo "No mlmodel in root"
          ls -la ReActorVideoAI/*.mlmodel 2>/dev/null || echo "No mlmodel in ReActorVideoAI"

      - name: Move Model to Correct Location
        run: |
          if [ -f "SimpleUpscaler_x4.mlmodel" ]; then
            echo "Moving model to ReActorVideoAI/"
            mv SimpleUpscaler_x4.mlmodel ReActorVideoAI/
          fi
          ls -la ReActorVideoAI/

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode Project
        run: |
          python create_xcode_project.py

      - name: Build iOS App (iPhone 16 Pro Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project ReActorVideoAI.xcodeproj \
            -scheme ReActorVideoAI \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build \
            2>&1 | tee build.log

      - name: Find and Package App
        run: |
          mkdir -p build-artifacts
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d -exec cp -R {} build-artifacts/ \; 2>/dev/null || echo "No app found"
          cp ReActorVideoAI/*.mlmodel build-artifacts/ 2>/dev/null || echo "No mlmodel"
          ls -la build-artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-and-model
          path: build-artifacts/

      - name: Upload Build Log (voor debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
